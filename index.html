<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    
    <link rel="icon" type="image/jpeg" href="487c910b-10a6-476c-b3f5-1a5763471a6c.jpg">
    <link rel="apple-touch-icon" href="487c910b-10a6-476c-b3f5-1a5763471a6c.jpg">
    
    <title>MUXI FOOT ⚡ LIVE матчи с временем</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a1a;
            --card: #16213e;
            --accent: #e94560;
            --gold: #f39c12;
            --text: #fff;
        }
        body[data-theme="light"] { --bg: #f0f2f5; --card: #ffffff; --text: #1a1a2e; }
        body[data-theme="blue"] { --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e); --card: rgba(255,255,255,0.1); --text: #fff; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            padding-bottom: 80px;
            transition: 0.3s;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-img {
            width: 48px;
            height: 48px;
            background-image: url('487c910b-10a6-476c-b3f5-1a5763471a6c.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
        }
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .theme-switch { display: flex; gap: 6px; background: var(--card); padding: 5px; border-radius: 30px; }
        .theme-btn { padding: 6px 12px; border: none; border-radius: 25px; cursor: pointer; background: transparent; color: var(--text); }
        .theme-btn.active { background: var(--accent); color: white; }
        
        .status-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .status-tab {
            flex: 1;
            padding: 12px;
            background: var(--card);
            border: 1px solid rgba(128,128,128,0.3);
            border-radius: 30px;
            color: var(--text);
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: 0.2s;
        }
        .status-tab.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .match-card {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(128,128,128,0.3);
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .league { font-size: 11px; opacity: 0.7; }
        .match-time {
            font-size: 11px;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 20px;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        .team {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .team-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            padding: 5px;
        }
        .team-name { font-size: 13px; font-weight: bold; }
        .vs { font-size: 12px; opacity: 0.5; }
        .score { font-size: 28px; font-weight: bold; text-align: center; margin: 10px 0; }
        .status {
            text-align: center;
            font-size: 12px;
            padding: 4px;
            border-radius: 20px;
        }
        .status-live { background: #e74c3c; animation: pulse 1s infinite; }
        .status-upcoming { background: #f39c12; }
        .status-finished { background: #27ae60; }
        
        .instruction-card {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            margin-top: 30px;
        }
        .instruction-title {
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .instruction-content { display: none; margin-top: 12px; }
        .instruction-content.show { display: block; }
        .browser-item {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .loader { text-align: center; padding: 40px; }
        .spinner {
            border: 3px solid rgba(128,128,128,0.3);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { text-align: center; margin-top: 20px; font-size: 10px; opacity: 0.5; }
        .update-badge { text-align: right; font-size: 10px; opacity: 0.5; margin-bottom: 10px; }
        .empty-state { text-align: center; padding: 40px; opacity: 0.6; }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-img"></div>
                <div class="logo-text">MUXI FOOT</div>
            </div>
            <div class="theme-switch">
                <button class="theme-btn" data-theme="dark">🌙</button>
                <button class="theme-btn" data-theme="light">☀️</button>
                <button class="theme-btn" data-theme="blue">🔵</button>
            </div>
        </div>
        
        <div class="update-badge" id="updateTime"></div>
        
        <div class="status-tabs">
            <div class="status-tab live active" data-status="live">🟢 LIVE</div>
            <div class="status-tab upcoming" data-status="upcoming">⚫ НЕ НАЧАЛСЯ</div>
            <div class="status-tab finished" data-status="finished">✅ ЗАВЕРШЁН</div>
        </div>
        
        <div id="matchesList">
            <div class="loader">
                <div class="spinner"></div>
                <div>Загрузка матчей...</div>
            </div>
        </div>
        
        <div class="instruction-card">
            <div class="instruction-title" onclick="toggleInstruction()">
                📱 Как добавить иконку на главный экран? <span id="instructionArrow">▼</span>
            </div>
            <div class="instruction-content" id="instructionContent">
                <div class="browser-item">🌐 Chrome: ⋮ → Установить приложение</div>
                <div class="browser-item">🍎 Safari: ⬆️ → На экран "Домой"</div>
            </div>
        </div>
        
        <div class="footer">⚡ MUXI FOOT — время начала матчей</div>
    </div>

    <script>
        const API_KEY = "a37a2f707d7f37fb28ce4451dcf42064";
        
        let allMatches = [];
        let currentFilter = "live";
        
        function formatMatchTime(dateStr, status) {
            if (!dateStr) return 'Время неизвестно';
            
            const matchDate = new Date(dateStr);
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const matchDay = new Date(matchDate.getFullYear(), matchDate.getMonth(), matchDate.getDate());
            
            const timeStr = matchDate.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            // Для LIVE матчей показываем минуту
            if (status === '1H' || status === '2H' || status === 'HT') {
                return null; // время не показываем, будет статус LIVE
            }
            
            if (matchDay.getTime() === today.getTime()) {
                return `Сегодня ${timeStr}`;
            } else {
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);
                if (matchDay.getTime() === tomorrow.getTime()) {
                    return `Завтра ${timeStr}`;
                }
            }
            
            return `${matchDate.toLocaleDateString('ru-RU')} ${timeStr}`;
        }
        
        function getMatchStatusType(match) {
            const status = match.status;
            if (status === '1H' || status === '2H' || status === 'HT' || status === 'LIVE') {
                return 'live';
            }
            if (status === 'FT' || status === 'AET' || status === 'PEN' || status === 'FINISHED') {
                return 'finished';
            }
            return 'upcoming';
        }
        
        function getStatusText(match) {
            const status = match.status;
            if (status === '1H' || status === '2H') return `🟢 LIVE (${match.elapsed}')`;
            if (status === 'HT') return `⏸️ ПЕРЕРЫВ (${match.elapsed}')`;
            if (status === 'FT') return '✅ ЗАВЕРШЁН';
            if (status === 'NS') return '⏳ НЕ НАЧАЛСЯ';
            return status;
        }
        
        function getMatchScore(match) {
            if (match.status === 'NS') {
                return { home: 0, away: 0 };
            }
            return { home: match.homeScore, away: match.awayScore };
        }
        
        async function fetchRealMatches() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${today}`, {
                    method: 'GET',
                    headers: { 'x-apisports-key': API_KEY }
                });
                
                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                
                if (!data.response || data.response.length === 0) return [];
                
                return data.response.slice(0, 50).map(m => ({ 
                    id: m.fixture.id, 
                    league: m.league.name, 
                    home: m.teams.home.name, 
                    homeLogo: m.teams.home.logo, 
                    away: m.teams.away.name, 
                    awayLogo: m.teams.away.logo, 
                    homeScore: m.goals.home ?? 0, 
                    awayScore: m.goals.away ?? 0, 
                    status: m.fixture.status.short, 
                    elapsed: m.fixture.status.elapsed || 0,
                    date: m.fixture.date
                }));
            } catch(e) { 
                console.log('Ошибка:', e);
                return []; 
            }
        }
        
        function renderMatches() {
            const container = document.getElementById('matchesList');
            const filtered = allMatches.filter(m => getMatchStatusType(m) === currentFilter);
            
            if (filtered.length === 0) {
                let message = '';
                if (currentFilter === 'live') message = '🟢 Нет LIVE матчей сейчас';
                else if (currentFilter === 'upcoming') message = '⚫ Нет запланированных матчей';
                else message = '✅ Нет завершённых матчей';
                container.innerHTML = `<div class="empty-state">${message}</div>`;
                return;
            }
            
            container.innerHTML = filtered.map(m => {
                const score = getMatchScore(m);
                const statusText = getStatusText(m);
                const isLive = getMatchStatusType(m) === 'live';
                const isUpcoming = getMatchStatusType(m) === 'upcoming';
                const isFinished = getMatchStatusType(m) === 'finished';
                const timeStr = formatMatchTime(m.date, m.status);
                
                let statusClass = '';
                if (isLive) statusClass = 'status-live';
                if (isUpcoming) statusClass = 'status-upcoming';
                if (isFinished) statusClass = 'status-finished';
                
                return `
                    <div class="match-card">
                        <div class="match-header">
                            <div class="league">${m.league}</div>
                            ${timeStr ? `<div class="match-time">⏰ ${timeStr}</div>` : ''}
                        </div>
                        <div class="teams">
                            <div class="team">
                                <img class="team-logo" src="${m.homeLogo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/44/44701.png'">
                                <div class="team-name">${m.home}</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <img class="team-logo" src="${m.awayLogo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/44/44701.png'">
                                <div class="team-name">${m.away}</div>
                            </div>
                        </div>
                        <div class="score">${score.home} : ${score.away}</div>
                        <div class="status ${statusClass}">${statusText}</div>
                    </div>
                `;
            }).join('');
        }
        
        async function loadMatches() {
            const container = document.getElementById('matchesList');
            const updateSpan = document.getElementById('updateTime');
            
            container.innerHTML = '<div class="loader"><div class="spinner"></div><div>Загрузка матчей...</div></div>';
            
            const now = new Date();
            updateSpan.innerHTML = `🕐 Обновлено: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            allMatches = await fetchRealMatches();
            renderMatches();
        }
        
        function setTheme(t) { 
            document.body.setAttribute('data-theme', t); 
            localStorage.setItem('muxi_theme', t); 
            document.querySelectorAll('.theme-btn').forEach(btn => { 
                if(btn.getAttribute('data-theme') === t) btn.classList.add('active'); 
                else btn.classList.remove('active'); 
            }); 
        }
        
        function toggleInstruction() { 
            const c = document.getElementById('instructionContent'); 
            const a = document.getElementById('instructionArrow'); 
            c.classList.toggle('show'); 
            a.innerHTML = c.classList.contains('show') ? '▲' : '▼'; 
        }
        
        document.querySelectorAll('.status-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.getAttribute('data-status');
                renderMatches();
            });
        });
        
        document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => setTheme(btn.getAttribute('data-theme'))));
        
        const savedTheme = localStorage.getItem('muxi_theme') || 'dark'; 
        setTheme(savedTheme); 
        loadMatches();
        setInterval(loadMatches, 60000);
    </script>
</body>
</html>
