<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    
    <link rel="icon" type="image/jpeg" href="487c910b-10a6-476c-b3f5-1a5763471a6c.jpg">
    <link rel="apple-touch-icon" href="487c910b-10a6-476c-b3f5-1a5763471a6c.jpg">
    
    <title>MUXI FOOT ⚡ Реальные матчи с уведомлениями</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a1a;
            --card: #16213e;
            --accent: #e94560;
            --gold: #f39c12;
            --text: #fff;
        }
        body[data-theme="light"] { --bg: #f0f2f5; --card: #ffffff; --text: #1a1a2e; }
        body[data-theme="blue"] { --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e); --card: rgba(255,255,255,0.1); --text: #fff; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            padding-bottom: 80px;
            transition: 0.3s;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-img {
            width: 48px;
            height: 48px;
            background-image: url('487c910b-10a6-476c-b3f5-1a5763471a6c.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
        }
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .theme-switch { display: flex; gap: 6px; background: var(--card); padding: 5px; border-radius: 30px; }
        .theme-btn { padding: 6px 12px; border: none; border-radius: 25px; cursor: pointer; background: transparent; color: var(--text); }
        .theme-btn.active { background: var(--accent); color: white; }
        
        .notification-toggle {
            background: var(--card);
            border: 1px solid var(--accent);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }
        .notification-toggle.on {
            background: var(--green);
            border-color: var(--green);
        }
        
        .match-card {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(128,128,128,0.3);
        }
        .league { font-size: 11px; opacity: 0.7; margin-bottom: 8px; }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        .team {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .team-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            padding: 5px;
        }
        .team-name { font-size: 13px; font-weight: bold; }
        .vs { font-size: 12px; opacity: 0.5; }
        .score { font-size: 28px; font-weight: bold; text-align: center; margin: 10px 0; }
        .status {
            text-align: center;
            font-size: 12px;
            padding: 4px;
            border-radius: 20px;
        }
        .status-live { background: var(--accent); animation: pulse 1s infinite; }
        .instruction-card {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            margin-top: 30px;
        }
        .instruction-title {
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .instruction-content { display: none; margin-top: 12px; }
        .instruction-content.show { display: block; }
        .browser-item {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .loader { text-align: center; padding: 40px; }
        .spinner {
            border: 3px solid rgba(128,128,128,0.3);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { text-align: center; margin-top: 20px; font-size: 10px; opacity: 0.5; }
        .update-badge { text-align: right; font-size: 10px; opacity: 0.5; margin-bottom: 10px; }
        .permission-prompt {
            background: var(--card);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid var(--accent);
        }
        .allow-btn {
            background: var(--accent);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-top: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-img"></div>
                <div class="logo-text">MUXI FOOT</div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="theme-btn" data-theme="dark">🌙</button>
                <button class="theme-btn" data-theme="light">☀️</button>
                <button class="theme-btn" data-theme="blue">🔵</button>
            </div>
        </div>
        
        <div id="notifyPermission" class="permission-prompt" style="display: none;">
            🔔 Включи уведомления, чтобы не пропустить голы!
            <div><button class="allow-btn" onclick="requestNotificationPermission()">✅ Включить уведомления</button></div>
        </div>
        
        <div class="update-badge" id="updateTime"></div>
        
        <div id="matchesList">
            <div class="loader">
                <div class="spinner"></div>
                <div>Загрузка матчей...</div>
            </div>
        </div>
        
        <div class="instruction-card">
            <div class="instruction-title" onclick="toggleInstruction()">
                📱 Как добавить иконку на главный экран? <span id="instructionArrow">▼</span>
            </div>
            <div class="instruction-content" id="instructionContent">
                <div class="browser-item">🌐 Chrome: ⋮ → Установить приложение</div>
                <div class="browser-item">🍎 Safari: ⬆️ → На экран "Домой"</div>
                <div class="browser-item">🦊 Firefox: ⋮ → Добавить на главный экран</div>
            </div>
        </div>
        
        <div class="footer">⚡ MUXI FOOT — реальные матчи | Уведомления о голах 🔔</div>
    </div>

    <script>
        const API_KEY = "a37a2f707d7f37fb28ce4451dcf42064";
        
        let currentMatches = [];
        let previousMatches = {};
        let notificationsEnabled = false;
        
        async function requestNotificationPermission() {
            if ('Notification' in window) {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    notificationsEnabled = true;
                    localStorage.setItem('notifications_enabled', 'true');
                    document.getElementById('notifyPermission').style.display = 'none';
                    new Notification('🔔 MUXI FOOT', {
                        body: 'Уведомления включены! Теперь ты узнаешь о голах первым.',
                        icon: '487c910b-10a6-476c-b3f5-1a5763471a6c.jpg'
                    });
                }
            }
        }
        
        function sendNotification(title, body, matchId) {
            if (!notificationsEnabled) return;
            if (document.hidden) {
                new Notification(title, {
                    body: body,
                    icon: '487c910b-10a6-476c-b3f5-1a5763471a6c.jpg',
                    tag: matchId,
                    renotify: false
                });
            }
        }
        
        function checkForUpdates(newMatches) {
            if (Object.keys(previousMatches).length === 0) {
                previousMatches = {};
                newMatches.forEach(m => {
                    previousMatches[m.id] = {
                        status: m.status,
                        homeScore: m.homeScore,
                        awayScore: m.awayScore
                    };
                });
                return;
            }
            
            newMatches.forEach(m => {
                const old = previousMatches[m.id];
                if (!old) {
                    sendNotification('🆕 Новый матч', `${m.home} - ${m.away} (${m.league})`, m.id);
                } else {
                    if (old.homeScore !== m.homeScore || old.awayScore !== m.awayScore) {
                        const deltaHome = m.homeScore - old.homeScore;
                        const deltaAway = m.awayScore - old.awayScore;
                        let goalMsg = '';
                        if (deltaHome > 0) goalMsg = `⚽ ГОЛ! ${m.home} забивает! ${old.homeScore}→${m.homeScore}`;
                        if (deltaAway > 0) goalMsg = `⚽ ГОЛ! ${m.away} забивает! ${old.awayScore}→${m.awayScore}`;
                        if (goalMsg) {
                            sendNotification('⚽ ГОЛ!', `${goalMsg}\n${m.home} ${m.homeScore}:${m.awayScore} ${m.away}`, m.id);
                        }
                    }
                    
                    if (old.status !== m.status) {
                        if (m.status === '1H' || m.status === '2H') {
                            if (old.status === 'NS') {
                                sendNotification('🟢 МАТЧ НАЧАЛСЯ', `${m.home} - ${m.away}`, m.id);
                            }
                        } else if (m.status === 'FT') {
                            sendNotification('🏁 МАТЧ ЗАВЕРШЁН', `${m.home} ${m.homeScore}:${m.awayScore} ${m.away}`, m.id);
                        }
                    }
                }
                
                previousMatches[m.id] = {
                    status: m.status,
                    homeScore: m.homeScore,
                    awayScore: m.awayScore
                };
            });
        }
        
        async function fetchRealMatches() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${today}`, {
                    method: 'GET',
                    headers: { 'x-apisports-key': API_KEY }
                });
                
                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                
                if (!data.response || data.response.length === 0) return [];
                
                return data.response.slice(0, 50).map(m => ({ 
                    id: m.fixture.id, 
                    league: m.league.name, 
                    home: m.teams.home.name, 
                    homeLogo: m.teams.home.logo, 
                    away: m.teams.away.name, 
                    awayLogo: m.teams.away.logo, 
                    homeScore: m.goals.home ?? 0, 
                    awayScore: m.goals.away ?? 0, 
                    status: m.fixture.status.short, 
                    elapsed: m.fixture.status.elapsed || 0
                }));
            } catch(e) { 
                console.log('Ошибка:', e);
                return []; 
            }
        }
        
        async function loadMatches() {
            const container = document.getElementById('matchesList');
            const updateSpan = document.getElementById('updateTime');
            
            container.innerHTML = '<div class="loader"><div class="spinner"></div><div>Загрузка матчей...</div></div>';
            
            const now = new Date();
            updateSpan.innerHTML = `🕐 Обновлено: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            const matches = await fetchRealMatches();
            
            if (!matches.length) { 
                container.innerHTML = '<div class="loader">⚠️ Сегодня матчей нет. Загляни завтра!</div>'; 
                return; 
            }
            
            checkForUpdates(matches);
            currentMatches = matches;
            
            container.innerHTML = matches.map(m => { 
                const isLive = ['1H','2H','HT'].includes(m.status); 
                const isFinished = m.status === 'FT';
                let statusText = '⏳ Не начался';
                if (isLive) statusText = `🟢 LIVE (${m.elapsed}')`;
                if (isFinished) statusText = '✅ Завершён';
                
                return `
                    <div class="match-card">
                        <div class="league">${m.league}</div>
                        <div class="teams">
                            <div class="team">
                                <img class="team-logo" src="${m.homeLogo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/44/44701.png'">
                                <div class="team-name">${m.home}</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <img class="team-logo" src="${m.awayLogo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/44/44701.png'">
                                <div class="team-name">${m.away}</div>
                            </div>
                        </div>
                        <div class="score">${m.homeScore} : ${m.awayScore}</div>
                        <div class="status ${isLive ? 'status-live' : ''}">${statusText}</div>
                    </div>
                `; 
            }).join('');
        }
        
        function setTheme(t) { 
            document.body.setAttribute('data-theme', t); 
            localStorage.setItem('muxi_theme', t); 
            document.querySelectorAll('.theme-btn').forEach(btn => { 
                if(btn.getAttribute('data-theme') === t) btn.classList.add('active'); 
                else btn.classList.remove('active'); 
            }); 
        }
        
        function toggleInstruction() { 
            const c = document.getElementById('instructionContent'); 
            const a = document.getElementById('instructionArrow'); 
            c.classList.toggle('show'); 
            a.innerHTML = c.classList.contains('show') ? '▲' : '▼'; 
        }
        
        if ('Notification' in window) {
            const saved = localStorage.getItem('notifications_enabled');
            if (saved === 'true') {
                notificationsEnabled = true;
            } else if (Notification.permission === 'granted') {
                notificationsEnabled = true;
                localStorage.setItem('notifications_enabled', 'true');
            } else if (Notification.permission !== 'denied') {
                document.getElementById('notifyPermission').style.display = 'block';
            }
        }
        
        document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => setTheme(btn.getAttribute('data-theme'))));
        
        const savedTheme = localStorage.getItem('muxi_theme') || 'dark'; 
        setTheme(savedTheme); 
        loadMatches();
        setInterval(loadMatches, 30000);
    </script>
</body>
</html>
